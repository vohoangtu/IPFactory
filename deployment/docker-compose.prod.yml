services:
  # Database (TimescaleDB)
  postgres:
    image: timescale/timescaledb-ha:pg18
    restart: always
    environment:
      POSTGRES_DB: ${DB_DATABASE:-worldos}
      POSTGRES_USER: ${DB_USERNAME:-worldos}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - worldos_prod_pgdata:/home/postgres/pgdata/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U worldos" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # Cache (Redis Stack with Vector Support)
  redis:
    image: redis/redis-stack-server:7.4.0-v3
    restart: always
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-changeme_redis}"]
    volumes:
      - worldos_prod_redisdata:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_redis}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # Event stream (Kafka API + REST) — Phase 1, doc §38
  redpanda:
    image: redpandadata/redpanda:v25.3.10
    restart: always
    command:
      - redpanda
      - start
      - --smp
      - "1"
      - --memory
      - "1G"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --kafka-addr
      - internal://0.0.0.0:9092
      - --advertise-kafka-addr
      - internal://redpanda:9092
      - --pandaproxy-addr
      - internal://0.0.0.0:8082
      - --advertise-pandaproxy-addr
      - internal://redpanda:8082
    healthcheck:
      test: [ "CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - internal

  # Graph DB (Phase 5 Track B — WorldOS Data Graph)
  neo4j:
    image: neo4j:2026.02.3-community
    restart: always
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/worldos_secret}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - worldos_prod_neo4jdata:/data
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider --user=neo4j --password=${NEO4J_PASSWORD:-worldos_secret} http://localhost:7474 || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s
    networks:
      - internal

  # Backend (PHP-FPM)
  # Use image's /var/www (code + vendor from build). Only mount storage and bootstrap/cache
  # so vendor stays from image (no dev deps → no Whoops I/O error on Windows bind mount).
  backend:
    build:
      context: ..
      dockerfile: deployment/backend.prod.Dockerfile
    restart: always
    env_file:
      - ../backend/.env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-worldos}
      DB_USERNAME: ${DB_USERNAME:-worldos}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      SIMULATION_ENGINE_GRPC_URL: http://engine:50052
      WORLDOS_GRAPH_URI: ${WORLDOS_GRAPH_URI:-http://neo4j:7474}
      WORLDOS_GRAPH_ENABLED: ${WORLDOS_GRAPH_ENABLED:-true}
      WORLDOS_GRAPH_USERNAME: ${WORLDOS_GRAPH_USERNAME:-neo4j}
      WORLDOS_GRAPH_PASSWORD: ${WORLDOS_GRAPH_PASSWORD:-worldos_secret}
      WORLDOS_EVENT_BUS_DRIVER: ${WORLDOS_EVENT_BUS_DRIVER:-redis_stream}
      WORLDOS_EVENT_STREAM_KAFKA_ENABLED: ${WORLDOS_EVENT_STREAM_KAFKA_ENABLED:-true}
      WORLDOS_EVENT_STREAM_REST_PROXY_URL: ${WORLDOS_EVENT_STREAM_REST_PROXY_URL:-http://redpanda:8082}
      WORLDOS_CAUSALITY_DRIVER: redis
      BROADCAST_DRIVER: centrifugo
      CENTRIFUGO_URL: http://centrifugo:8000
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme_redis}
      CENTRIFUGO_KEY: ${CENTRIFUGO_KEY:-changeme_centrifugo_api}
      CENTRIFUGO_SECRET: ${CENTRIFUGO_SECRET:-worldos_centrifugo_hmac_secret_key_32bytes_min}
      SOCIAL_ENGINE_URL: http://social_engine:5001/api/v1
      SOCIAL_ENGINE_MOCK: "${SOCIAL_ENGINE_MOCK:-false}"
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      NARRATIVE_LLM_KEY: ${NARRATIVE_LLM_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}

    volumes:
      - backend_storage:/var/www/storage
      - backend_bootstrap_cache:/var/www/bootstrap/cache
      - backend_public:/var/www/public
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  # Scheduler (Laravel)
  scheduler:
    build:
      context: ..
      dockerfile: deployment/backend.prod.Dockerfile
    restart: always
    env_file:
      - ../backend/.env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-worldos}
      DB_USERNAME: ${DB_USERNAME:-worldos}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      WORLDOS_GRAPH_URI: ${WORLDOS_GRAPH_URI:-http://neo4j:7474}
      WORLDOS_GRAPH_ENABLED: ${WORLDOS_GRAPH_ENABLED:-false}
      WORLDOS_GRAPH_USERNAME: ${WORLDOS_GRAPH_USERNAME:-neo4j}
      WORLDOS_GRAPH_PASSWORD: ${WORLDOS_GRAPH_PASSWORD:-worldos_secret}
      WORLDOS_EVENT_BUS_DRIVER: ${WORLDOS_EVENT_BUS_DRIVER:-database}
      BROADCAST_DRIVER: centrifugo
      CENTRIFUGO_URL: http://centrifugo:8000
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme_redis}
      CENTRIFUGO_KEY: ${CENTRIFUGO_KEY:-changeme_centrifugo_api}
      CENTRIFUGO_SECRET: ${CENTRIFUGO_SECRET:-worldos_centrifugo_hmac_secret_key_32bytes_min}
      SOCIAL_ENGINE_URL: http://social_engine:5001/api/v1
      SOCIAL_ENGINE_MOCK: "${SOCIAL_ENGINE_MOCK:-false}"
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      NARRATIVE_LLM_KEY: ${NARRATIVE_LLM_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}

    command: [ "php", "artisan", "schedule:work" ]
    volumes:
      - backend_storage:/var/www/storage
      - backend_bootstrap_cache:/var/www/bootstrap/cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  # Worker (Laravel)
  worker:
    build:
      context: ..
      dockerfile: deployment/backend.prod.Dockerfile
    restart: always
    env_file:
      - ../backend/.env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-worldos}
      DB_USERNAME: ${DB_USERNAME:-worldos}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      WORLDOS_GRAPH_URI: ${WORLDOS_GRAPH_URI:-http://neo4j:7474}
      WORLDOS_GRAPH_ENABLED: ${WORLDOS_GRAPH_ENABLED:-false}
      WORLDOS_GRAPH_USERNAME: ${WORLDOS_GRAPH_USERNAME:-neo4j}
      WORLDOS_GRAPH_PASSWORD: ${WORLDOS_GRAPH_PASSWORD:-worldos_secret}
      WORLDOS_EVENT_BUS_DRIVER: ${WORLDOS_EVENT_BUS_DRIVER:-database}
      BROADCAST_DRIVER: centrifugo
      CENTRIFUGO_URL: http://centrifugo:8000
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme_redis}
      CENTRIFUGO_KEY: ${CENTRIFUGO_KEY:-changeme_centrifugo_api}
      CENTRIFUGO_SECRET: ${CENTRIFUGO_SECRET:-worldos_centrifugo_hmac_secret_key_32bytes_min}
      SOCIAL_ENGINE_URL: http://social_engine:5001/api/v1
      SOCIAL_ENGINE_MOCK: "${SOCIAL_ENGINE_MOCK:-false}"
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      NARRATIVE_LLM_KEY: ${NARRATIVE_LLM_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}

    command: [ "php", "artisan", "queue:work" ]
    volumes:
      - backend_storage:/var/www/storage
      - backend_bootstrap_cache:/var/www/bootstrap/cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  # Frontend (Next.js)
  frontend:
    build:
      context: ../frontend
      dockerfile: ../deployment/frontend.prod.Dockerfile
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: /api # Use relative path since served by Nginx
      BACKEND_URL: http://nginx
    depends_on:
      - backend
    networks:
      - internal

  # Engine (Rust)
  engine:
    build:
      context: ..
      dockerfile: deployment/engine.prod.Dockerfile
      provenance: false
    restart: always
    environment:
      GRPC_ADDR: 0.0.0.0:50051
      HTTP_ADDR: 0.0.0.0:50052
      DATABASE_URL: postgres://${DB_USERNAME:-worldos}:${DB_PASSWORD:-secret}@postgres:5432/${DB_DATABASE:-worldos}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  # NarrativeLoom API (FastAPI)
  narrative_loom:
    build:
      context: ../narrative-loom
      dockerfile: Dockerfile
      provenance: false
    restart: always
    environment:
      MODE: api
      WORLDOS_API_URL: http://nginx/api
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      LOCAL_LLM_URL: ${LOCAL_LLM_URL:-}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme_redis}@redis:6379/0
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme_redis}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-changeme_redis}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-changeme_redis}@redis:6379/1
      CENTRIFUGO_URL: http://centrifugo:8000
      CENTRIFUGO_KEY: ${CENTRIFUGO_KEY:-changeme_centrifugo_api}
      SEMANTIC_CACHE_ENABLED: "false"
      LLM_CACHE_ENABLED: "true"
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8001/health\")' || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal

  # NarrativeLoom Worker (Celery)
  narrative_loom_worker:
    build:
      context: ../narrative-loom
      dockerfile: Dockerfile
      provenance: false
    restart: always
    environment:
      MODE: worker
      CELERY_CONCURRENCY: 2
      WORLDOS_API_URL: http://nginx/api
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      LOCAL_LLM_URL: ${LOCAL_LLM_URL:-}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme_redis}@redis:6379/0
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme_redis}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-changeme_redis}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-changeme_redis}@redis:6379/1
      CENTRIFUGO_URL: http://centrifugo:8000
      CENTRIFUGO_KEY: ${CENTRIFUGO_KEY:-changeme_centrifugo_api}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-https://cloud.langfuse.com}
      SEMANTIC_CACHE_ENABLED: "false"
      LLM_CACHE_ENABLED: "true"
      BACKEND_WEBHOOK_URL: http://nginx/api/worldos/narrative-loom/webhook
    depends_on:
      redis:
        condition: service_healthy
      narrative_loom:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "celery -A core.celery_app inspect ping --destination celery@$$HOSTNAME || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - internal

  # Social Engine (Python/FastAPI Swarm AI)
  social_engine:
    build:
      context: ../sim/social-engine
      dockerfile: Dockerfile
      provenance: false
    restart: always
    environment:
      PORT: 5001
      LLM_API_KEY: ${OPENAI_API_KEY:-}
      LLM_MODEL_NAME: ${LLM_MODEL_NAME:-gpt-4o-mini}
      ZEP_API_KEY: ${ZEP_API_KEY:-}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme_redis}@redis:6379/0
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme_redis}
      LLM_CACHE_ENABLED: "true"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:5001/api/v1/health\")' || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal

  # Centrifugo (Realtime Messaging)
  centrifugo:
    image: centrifugo/centrifugo:v6
    restart: always
    command: centrifugo --config=/centrifugo/config.json
    volumes:
      - ./centrifugo/config.json:/centrifugo/config.json
    networks:
      - internal
    ports:
      - 8000:8000

  # Nginx Gateway
  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - backend_public:/var/www/public:ro # Read-only public files
    depends_on:
      - backend
      - frontend
    networks:
      - internal

volumes:
  worldos_prod_pgdata:
  worldos_prod_redisdata:
  worldos_prod_neo4jdata:
  backend_public:
  backend_storage:
  backend_bootstrap_cache:


networks:
  internal:
    driver: bridge
