limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    root /var/www/public;
    index index.php index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    location /health {
        return 200 "OK";
    }

    # 1. Data Plane: Direct Simulation (Engine) — must be before /api catch-all
    location ^~ /api/sim/ {
        limit_req zone=api_limit burst=20 nodelay;
        rewrite ^/api/sim/(.*) /$1 break;
        proxy_pass http://engine:50052;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
    }

    # 2. Control Plane: Backend API (Laravel via PHP-FPM)
    location ^~ /api {
        limit_req zone=api_limit burst=20 nodelay;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param DOCUMENT_ROOT /var/www/public;
        fastcgi_param SERVER_NAME $host;
        fastcgi_param HTTPS off;
        fastcgi_pass backend:9000;
        fastcgi_read_timeout 300;
        fastcgi_connect_timeout 300;
    }

    # 3. Centrifugo Websocket
    location /connection/websocket {
        proxy_pass http://centrifugo:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 4. Backend Storage
    location ^~ /storage {
        alias /var/www/storage/app/public;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # 5. PHP handler
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass backend:9000;
        fastcgi_read_timeout 300;
    }

    # 6. Frontend: Next.js UI (catch-all)
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
    }

    # Block all dotfiles (not just .ht*)
    location ~ /\. {
        deny all;
    }
}
